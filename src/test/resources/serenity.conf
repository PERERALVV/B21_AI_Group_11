webdriver {
  driver = chrome
  autodownload = true
  base.url = "http://localhost:8080"
  capabilities {
    browserName = "chrome"
    acceptInsecureCerts = true
    "goog:chromeOptions" {
      args = [
        "test-type",
        "no-sandbox",
        "ignore-certificate-errors",
        "--window-size=1280,1024",
        "incognito",
        "disable-infobars",
        "disable-gpu",
        "disable-default-apps",
        "disable-popup-blocking",
        "headless"
      ]
    }
  }
}

webdriver.base.url = "http://localhost:8080"

serenity {
  take.screenshots = FOR_FAILURES
  test.root = "qatraining"
  logging = "NORMAL"
  # Fresh browser per scenario so auth/session state never bleeds between tests
  restart.browser.for.each = scenario
}
